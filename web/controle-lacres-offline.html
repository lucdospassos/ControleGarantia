<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Controle de Lacres e Garantias</title>
<style>
  :root{--ink:#1c2430;--ink-soft:#5b6472;--paper:#f4f6f8;--card:#fff;--line:#e1e6eb;--accent:#1f6f5c;--accent-dark:#164f41;--warn:#b3541e;--danger:#a4322a;--danger-bg:#fbeceb;--ok-bg:#e9f4f0;}
  *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:35px} header{background:var(--accent-dark);color:#fff;padding:22px 18px 60px} header h1{margin:0;font-size:1.35rem} header p{margin:4px 0 0;color:#cfe3dc;font-size:.86rem}.wrap{max-width:680px;margin:0 auto;padding:0 14px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:-40px;box-shadow:0 6px 18px rgba(20,30,40,.08)}.card+.card{margin-top:16px}.normal-card{margin-top:16px}label{display:block;font-size:.78rem;font-weight:700;color:var(--ink-soft);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.4px}input[type=text],input[type=date],input[type=tel],input[type=number],textarea,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:1rem;background:#fbfcfd;color:var(--ink)}textarea{min-height:82px;resize:vertical}.radios{display:flex;gap:10px;flex-direction:column;font-size:.94rem}.radios label{display:flex;gap:8px;align-items:center;margin:3px 0;text-transform:none;letter-spacing:0;color:var(--ink);font-weight:600}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:9px;padding:11px 16px;font-size:.95rem;font-weight:700;cursor:pointer}.btn-primary{background:var(--accent);color:#fff;width:100%;margin-top:14px}.btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn-sm{font-size:.82rem;padding:9px 12px}.toolbar{display:flex;gap:8px;margin-top:16px}.toolbar input{flex:1}.section-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);margin:20px 4px 8px}.item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}.item-code{font-size:.78rem;font-weight:800;color:var(--accent-dark);letter-spacing:.3px}.item-name{font-size:1.05rem;font-weight:700;margin:2px 0}.item-info{font-size:.85rem;color:var(--ink-soft);line-height:1.35}.badge{font-size:.73rem;font-weight:800;padding:4px 9px;border-radius:999px;display:inline-block;margin-top:7px}.badge-ok{background:var(--ok-bg);color:var(--accent-dark)}.badge-warn{background:#fbf1e6;color:var(--warn)}.badge-expired{background:var(--danger-bg);color:var(--danger)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.empty{text-align:center;color:var(--ink-soft);padding:40px 20px;font-size:.9rem}footer{max-width:680px;margin:22px auto 0;padding:0 14px;display:flex;gap:10px}footer .btn{flex:1;font-size:.85rem;padding:10px}#fileImport{display:none}.hint{color:var(--ink-soft);font-size:.82rem;margin-top:6px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pagination-bar{display:flex;align-items:center;gap:10px;margin:20px 4px 8px}.pagination-bar .section-title{margin:0;flex:1}.pagination-bar select{width:auto;min-width:145px;padding:8px 10px}.pager{display:flex;align-items:center;gap:8px;margin:8px 0 14px}.pager button{flex:1}.pager span{flex:1;text-align:center;color:var(--ink-soft);font-weight:700;font-size:.85rem}@media(max-width:460px){.row{grid-template-columns:1fr}footer{flex-direction:column}.pagination-bar{flex-direction:column;align-items:stretch}.pagination-bar select{width:100%}}
</style>
</head>
<body>
<header><div class="wrap"><h1>Controle de Lacres e Garantias</h1><p>Versão de teste em HTML v1.5.0. No app Android, o banco principal é SQLite e o JSON é backup.</p></div></header>
<div class="wrap">
  <div class="card">
    <button class="btn btn-primary" id="btnComprar" style="margin-top:0;margin-bottom:12px">Comprar lacres: (81) 98849-6130</button>
    <label for="lacre">Número do lacre *</label><input type="text" id="lacre" placeholder="Ex: A01567">
    <label for="cliente">Nome do cliente *</label><input type="text" id="cliente" placeholder="Ex: Maria Souza">
    <label for="telefone">Fone / WhatsApp</label><input type="tel" id="telefone" placeholder="Ex: (81) 99999-9999">
    <label for="dataCadastro">Data da compra / cadastro *</label><input type="date" id="dataCadastro">
    <label>Tipo de garantia</label>
    <div class="radios">
      <label><input type="radio" name="tipoGarantia" value="dias" checked> Garantia por quantidade de dias</label>
      <label><input type="radio" name="tipoGarantia" value="data"> Garantia até uma data específica</label>
    </div>
    <div id="blocoDias"><label for="diasGarantia">Quantidade de dias</label><input type="number" id="diasGarantia" value="90" min="0" step="1"></div>
    <div id="blocoData" hidden><label for="dataVencimento">Data final da garantia</label><input type="date" id="dataVencimento"></div>
    <div class="hint" id="vencimentoCalculado"></div>
    <label for="observacao">Observação</label><textarea id="observacao" placeholder="Ex: troca de tela, manutenção, número da OS etc."></textarea>
    <button class="btn btn-primary" id="btnSalvar">Salvar registro</button>
    <button class="btn btn-ghost" id="btnLimpar" style="width:100%;margin-top:8px">Limpar campos</button>
  </div>
  <div class="card normal-card">
    <label for="busca">Buscar</label><input type="text" id="busca" placeholder="Buscar por lacre, cliente ou telefone">
    <label for="filtro">Filtro</label><select id="filtro"><option value="todos">Todos</option><option value="vigentes">Em garantia</option><option value="proximos">Vencendo em até 30 dias</option><option value="vencidos">Vencidos</option></select>
  </div>
  <div class="pagination-bar">
    <div class="section-title" id="contagem">Registros</div>
    <select id="porPagina"><option value="5" selected>5 por página</option><option value="10">10 por página</option><option value="20">20 por página</option><option value="50">50 por página</option><option value="0">Todos</option></select>
  </div>
  <div id="lista"></div>
  <div class="pager" id="pager"><button class="btn btn-ghost btn-sm" id="btnPrev">Anterior</button><span id="pageInfo"></span><button class="btn btn-ghost btn-sm" id="btnNext">Próxima</button></div>
</div>
<footer><button class="btn btn-ghost" id="btnExportar">Exportar backup JSON</button><button class="btn btn-ghost" id="btnImportarTrigger">Importar JSON</button><input type="file" id="fileImport" accept="application/json"></footer>
<script>
const STORAGE_KEY='controle_lacres_registros_v1'; let editandoId=null, paginaAtual=1;
const $=id=>document.getElementById(id); const hoje=()=>new Date().toISOString().slice(0,10);
function uid(){return crypto?.randomUUID?.()||Date.now().toString(36)+Math.random().toString(36).slice(2)}
function carregar(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){return[]}}
function salvarTudo(lista){localStorage.setItem(STORAGE_KEY,JSON.stringify(lista));}
function dataBR(iso){if(!iso)return''; const [a,m,d]=iso.split('-'); return `${d}/${m}/${a}`}
function addDias(iso,dias){const dt=new Date(iso+'T00:00:00');dt.setDate(dt.getDate()+Number(dias||0));return dt.toISOString().slice(0,10)}
function diffDias(iso){const h=new Date(hoje()+'T00:00:00');const d=new Date(iso+'T00:00:00');return Math.round((d-h)/86400000)}
function status(iso){const d=diffDias(iso);if(d<0)return{t:'Vencida',c:'badge-expired'};if(d<=30)return{t:`Vence em ${d}d`,c:'badge-warn'};return{t:'Em garantia',c:'badge-ok'}}
function normalizarLacre(s){return (s||'').replace(/\s+/g,'').toUpperCase()}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function tipo(){return document.querySelector('input[name="tipoGarantia"]:checked').value}
function calcularVencimento(){return tipo()==='dias'?addDias($('dataCadastro').value,$('diasGarantia').value):$('dataVencimento').value}
function atualizarTipo(){const porDias=tipo()==='dias';$('blocoDias').hidden=!porDias;$('blocoData').hidden=porDias;atualizarVencimento()}
function atualizarVencimento(){const v=calcularVencimento();$('vencimentoCalculado').textContent=v?`Vencimento calculado: ${dataBR(v)} · ${status(v).t}`:''}
function limpar(){editandoId=null;$('lacre').value='';$('cliente').value='';$('telefone').value='';$('dataCadastro').value=hoje();$('diasGarantia').value=90;$('dataVencimento').value='';$('observacao').value='';document.querySelector('input[value="dias"]').checked=true;$('btnSalvar').textContent='Salvar registro';atualizarTipo()}
function salvar(){const lacre=normalizarLacre($('lacre').value);$('lacre').value=lacre; const cliente=$('cliente').value.trim(), telefone=$('telefone').value.trim(), dataCadastro=$('dataCadastro').value, observacao=$('observacao').value.trim(), venc=calcularVencimento(); if(!lacre||!cliente||!dataCadastro||!venc){alert('Preencha lacre, cliente, data e garantia.');return} let dados=carregar(); if(dados.some(r=>r.numero_lacre===lacre&&r.id!==editandoId)){alert('Este lacre já está cadastrado neste celular.');return} const agora=new Date().toISOString(); if(editandoId){dados=dados.map(r=>r.id===editandoId?{...r,numero_lacre:lacre,cliente,telefone,data_cadastro:dataCadastro,tipo_garantia:tipo(),dias_garantia:tipo()==='dias'?Number($('diasGarantia').value||0):null,data_vencimento:venc,observacao,atualizado_em:agora}:r)}else{dados.push({id:uid(),numero_lacre:lacre,cliente,telefone,data_cadastro:dataCadastro,tipo_garantia:tipo(),dias_garantia:tipo()==='dias'?Number($('diasGarantia').value||0):null,data_vencimento:venc,observacao,criado_em:agora,atualizado_em:agora})} salvarTudo(dados);limpar();render()}
function editar(id){const r=carregar().find(x=>x.id===id);if(!r)return;editandoId=id;$('lacre').value=r.numero_lacre;$('cliente').value=r.cliente;$('telefone').value=r.telefone||'';$('dataCadastro').value=r.data_cadastro;$('observacao').value=r.observacao||'';document.querySelector(`input[value="${r.tipo_garantia||'data'}"]`).checked=true;if(r.tipo_garantia==='dias')$('diasGarantia').value=r.dias_garantia||90;else $('dataVencimento').value=r.data_vencimento;$('btnSalvar').textContent='Atualizar registro';atualizarTipo();scrollTo({top:0,behavior:'smooth'})}
function excluir(id){if(!confirm('Excluir este registro?'))return;salvarTudo(carregar().filter(r=>r.id!==id));render()}
function wa(fone){let d=(fone||'').replace(/\D/g,'');if(!d)return; if(d.length<=11)d='55'+d; open('https://wa.me/'+d,'_blank')}
function render(){const termo=$('busca').value.trim().toLowerCase(), filtro=$('filtro').value, porPagina=Number($('porPagina').value);let dados=carregar().sort((a,b)=>a.data_vencimento.localeCompare(b.data_vencimento)); if(termo)dados=dados.filter(r=>[r.numero_lacre,r.cliente,r.telefone].some(x=>(x||'').toLowerCase().includes(termo))); if(filtro==='vencidos')dados=dados.filter(r=>diffDias(r.data_vencimento)<0); if(filtro==='proximos')dados=dados.filter(r=>diffDias(r.data_vencimento)>=0&&diffDias(r.data_vencimento)<=30); if(filtro==='vigentes')dados=dados.filter(r=>diffDias(r.data_vencimento)>=0); const total=dados.length; $('contagem').textContent=`Registros (${total})`; if(!total){$('lista').innerHTML='<div class="empty">Nenhum registro encontrado.<br>Cadastre acima para começar.</div>';$('pageInfo').textContent='';$('btnPrev').disabled=true;$('btnNext').disabled=true;return} let totalPaginas=1,inicio=0,fim=total;if(porPagina>0){totalPaginas=Math.max(1,Math.ceil(total/porPagina));paginaAtual=Math.min(Math.max(1,paginaAtual),totalPaginas);inicio=(paginaAtual-1)*porPagina;fim=Math.min(inicio+porPagina,total)}else{paginaAtual=1} const exibidos=dados.slice(inicio,fim);$('lista').innerHTML=exibidos.map(r=>{const st=status(r.data_vencimento);return `<div class="item"><div class="item-code">Lacre ${esc(r.numero_lacre)}</div><div class="item-name">${esc(r.cliente)}</div><div class="item-info">${r.telefone?esc(r.telefone)+'<br>':''}Compra/cadastro: ${dataBR(r.data_cadastro)}<br>Garantia até: ${dataBR(r.data_vencimento)}${r.observacao?'<br>Obs: '+esc(r.observacao):''}</div><span class="badge ${st.c}">${st.t}</span><div class="actions"><button class="btn btn-ghost btn-sm" onclick="editar('${r.id}')">Editar</button><button class="btn btn-ghost btn-sm" onclick="excluir('${r.id}')">Excluir</button>${r.telefone?`<button class="btn btn-ghost btn-sm" onclick="wa('${esc(r.telefone)}')">WhatsApp</button>`:''}</div></div>`}).join('');$('pageInfo').textContent=porPagina>0?`Pág. ${paginaAtual}/${totalPaginas} · ${inicio+1}-${fim}`:`Todos: ${total}`;$('btnPrev').disabled=porPagina<=0||paginaAtual<=1;$('btnNext').disabled=porPagina<=0||paginaAtual>=totalPaginas;}
$('btnComprar').onclick=()=>open('https://wa.me/5581988496130?text=Ol%C3%A1%2C%20gostaria%20de%20comprar%20lacre%20de%20garantia.','_blank');$('lacre').addEventListener('input',()=>{$('lacre').value=normalizarLacre($('lacre').value)});$('btnSalvar').onclick=salvar;$('btnLimpar').onclick=limpar;['dataCadastro','diasGarantia','dataVencimento'].forEach(id=>$(id).addEventListener('input',atualizarVencimento));document.querySelectorAll('input[name="tipoGarantia"]').forEach(r=>r.addEventListener('change',atualizarTipo));$('busca').oninput=()=>{paginaAtual=1;render()};$('filtro').onchange=()=>{paginaAtual=1;render()};$('porPagina').onchange=()=>{paginaAtual=1;render()};$('btnPrev').onclick=()=>{if(paginaAtual>1){paginaAtual--;render()}};$('btnNext').onclick=()=>{paginaAtual++;render()};
$('btnExportar').onclick=()=>{const blob=new Blob([JSON.stringify(carregar(),null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`backup-lacres-${hoje()}.json`;a.click();URL.revokeObjectURL(url)};$('btnImportarTrigger').onclick=()=>$('fileImport').click();$('fileImport').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{try{const imp=JSON.parse(ev.target.result);if(!Array.isArray(imp))throw 0;const atual=carregar();const lacres=new Set(atual.map(r=>r.numero_lacre));const novos=imp.map(r=>({...r,numero_lacre:normalizarLacre(r.numero_lacre||r.codigo||'')})).filter(r=>r&&r.id&&r.numero_lacre&&!lacres.has(r.numero_lacre));salvarTudo([...atual,...novos]);alert(`Importação concluída. ${novos.length} registro(s) novo(s).`);render()}catch(err){alert('Arquivo JSON inválido.')}e.target.value=''};rd.readAsText(f)};limpar();render();
</script>
</body>
</html>
