name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-24.04
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Gradle 8.7
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.7'
          cache-disabled: true

      - name: Instalar plataforma Android necessária
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Compilar APK Debug
        run: gradle :app:assembleDebug --no-daemon

      - name: Enviar APK Debug como artifact
        uses: actions/upload-artifact@v6
        with:
          name: ControleLacresGarantia-v1.5-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Preparar chave de assinatura Release
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n' | base64 --decode > release-key.jks
          ls -lh release-key.jks

      - name: Compilar APK Release assinado
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          gradle :app:assembleRelease --no-daemon \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"

      - name: Enviar APK Release assinado como artifact
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v6
        with:
          name: ControleLacresGarantia-v1.5-release-assinado-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
