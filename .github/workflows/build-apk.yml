name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Verificar Gradle
        run: gradle -v

      - name: Compilar APK Debug
        run: gradle :app:assembleDebug --no-daemon

      - name: Preparar chave release
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks

      - name: Compilar APK Release Assinado
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release-key.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Enviar APK Debug como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ControleLacresGarantia-v1.5-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Enviar APK Release Assinado como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ControleLacresGarantia-v1.5-release-assinado-apk
          path: app/build/outputs/apk/release/*.apk
